name: Slipstitch
options:
  bundleIdPrefix: com.slipstitch
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  generateEmptyDirectories: true

settings:
  base:
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0" # Swift 6.2 compiler, language mode 5 (concurrency checks non-fatal) for fast feature dev
    DEVELOPMENT_TEAM: "" # set your Apple team id to build on device
    CODE_SIGN_STYLE: Automatic

targets:
  Slipstitch:
    type: application
    platform: iOS
    # Glob the whole source tree: parallel feature worktrees add files here
    # without ever editing project.yml, so the project file never conflicts.
    sources:
      - path: Slipstitch
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.slipstitch.app
        TARGETED_DEVICE_FAMILY: "1" # iPhone only (portrait-first); avoids iPad all-orientations requirement
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_ITSAppUsesNonExemptEncryption: NO # only standard HTTPS/TLS (export-compliance exempt)
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_NSPhotoLibraryUsageDescription: "Slipstitch needs access to your photos so you can add pictures of your crochet projects."
        INFOPLIST_KEY_NSCameraUsageDescription: "Slipstitch uses the camera to photograph your work in progress."
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        INFOPLIST_KEY_UISupportedInterfaceOrientations: "UIInterfaceOrientationPortrait"
        ENABLE_USER_SCRIPT_SANDBOXING: YES
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    entitlements:
      path: Slipstitch/Slipstitch.entitlements
      properties:
        com.apple.developer.applesignin:
          - Default
